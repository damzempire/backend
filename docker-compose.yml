version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: vesting-vault-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vesting_vault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - vesting-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vesting_vault"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vesting-vault-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: vesting_vault
      DB_USER: postgres
      DB_PASSWORD: password
      STELLAR_RPC_URL: ${STELLAR_RPC_URL:-https://soroban-testnet.stellar.org}
      STELLAR_NETWORK_PASSPHRASE: ${STELLAR_NETWORK_PASSPHRASE:-"Test SDF Network ; September 2015"}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vesting-network
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis (optional, for caching/sessions)
  redis:
    image: redis:7-alpine
    container_name: vesting-vault-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vesting-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Jaeger (OpenTelemetry tracing backend)
  jaeger:
    image: jaegertracing/all-in-one:1.64
    container_name: vesting-vault-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "5775:5775/udp"     # Agent - accept zipkin.thrift over compact thrift protocol (deprecated)
      - "6831:6831/udp"     # Agent - accept jaeger.thrift over compact thrift protocol (deprecated)
      - "6832:6832/udp"     # Agent - accept jaeger.thrift over binary thrift protocol (deprecated)
      - "5778:5778"         # Agent - serve configs
      - "16686:16686"       # UI - Jaeger UI
      - "16687:16687"       # Frontend - Jaeger frontend
      - "14268:14268"       # Collector - accept jaeger.thrift directly from clients (deprecated)
      - "14250:14250"       # Collector - accept model.proto (gRPC)
      - "9411:9411"         # Collector - Zipkin compatible API (optional)
      - "4317:4317"         # Collector - OTLP gRPC receiver
      - "4318:4318"         # Collector - OTLP HTTP receiver
    networks:
      - vesting-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  vesting-network:
    driver: bridge
